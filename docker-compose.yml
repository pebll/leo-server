services:
  website:
    container_name: website-service
    build:
      context: ./website
      network: host
      dockerfile: Dockerfile
    networks:
      - backend
  calavera-server:
    container_name: calavera-server-service
    build:
      context: ./calavera-server/
      network: host
      dockerfile: Dockerfile
    networks:
      - backend
  elo-estimator:
    container_name: elo-estimator-website-service
    build:
      context: ./elo-estimator/
      network: host
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - URL_PREFIX=/elo-estimator
    volumes:
      - ./elo-estimator/elo-estimator/web/data/:/app/web/data
    networks:
      - backend
  caddy:
    container_name: caddy-service
    image: caddy
    restart: always
    ports:
      - '80:80' # http
      - '443:443' # https
    volumes:
      - caddy-config:/config
      - caddy-data:/data
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
    networks:
      - backend
  radicale:
    image: tomsquest/docker-radicale
    container_name: radicale-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:5232:5232"
    volumes:
      - ./radicale/data:/data
      - ./radicale/config:/config:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - KILL
    pids_limit: 50
    mem_limit: 256M
    networks:
      - backend

volumes:
  caddy-config:
  caddy-data:
networks: 
  backend: {}
